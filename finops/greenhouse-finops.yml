providerId: greenhouse
publisherName: Greenhouse Software, Inc.
serviceCategory: Recruiting / ATS SaaS
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - ATS
  - Recruiting
  - HR
description: 'FOCUS-aligned FinOps for Greenhouse: tiered annual subscription (Core / Plus / Pro)
  with custom pricing per customer; APIs included at no per-call charge. Cost grows with tier and
  with employee / hiring-team count rather than with API volume.'
sources:
  - https://www.greenhouse.com/pricing
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Greenhouse
  ServiceCategory: Recruiting / ATS SaaS
  ProviderName: Greenhouse
  PublisherName: Greenhouse Software, Inc.
  InvoiceIssuerName: Greenhouse Software, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: subscription_fee
    description: Annual platform subscription fee per tier
    unit: year
    aggregation: sum
    dimensions:
      - tier
  - name: hiring_team_seats
    description: Hiring team seats provisioned (scoping factor for tier sizing)
    unit: seat
    aggregation: max
    dimensions:
      - team
      - region
  - name: api_requests
    description: API requests across Harvest / Job Board / Candidate Ingestion / Onboarding
      (operational metric, not directly billed)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - integration
  - name: webhook_deliveries
    description: Outbound webhook deliveries
    unit: event
    aggregation: sum
    dimensions:
      - event_type
principles:
  - name: Visibility
    description: Use Greenhouse usage reports plus integration logs (Harvest X-RateLimit-Remaining
      values) to understand consumption profile and pre-empt limit pressure.
  - name: Allocation
    description: Map hiring teams / business units to Greenhouse user groups so the annual
      subscription can be allocated by hiring volume per division.
  - name: Optimization
    description: Right-size tier (Core vs Plus vs Pro) to actual hiring complexity and feature
      need; consolidate redundant integrations to limit API and webhook fan-out; clean up
      inactive users at renewal.
  - name: Accountability
    description: Designate a Talent / People-Ops owner accountable for the Greenhouse contract
      and integration health; review usage at renewal time.
maintainers:
