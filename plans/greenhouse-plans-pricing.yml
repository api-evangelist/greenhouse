description: Greenhouse offers three customer-facing recruiting / ATS plan tiers — Core, Plus, and
  Pro — with pricing customized per customer based on hiring volume and organizational complexity.
  No public per-user prices are listed; customers contact sales for a quote. Customers may upgrade
  between tiers as their needs evolve. The Greenhouse Harvest, Job Board, Candidate Ingestion,
  Onboarding, Assessment, Audit Log, and Webhook APIs are included with the Greenhouse subscription;
  there is no per-call API fee.
sources:
  - https://www.greenhouse.com/pricing
