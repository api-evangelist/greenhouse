naftiko: 1.0.0-alpha2
info:
  label: Greenhouse Onboarding API
  description: 'Greenhouse Onboarding API. 1 operations. Lead operation: Execute GraphQL query or mutation. Self-contained
    Naftiko capability covering one Greenhouse business surface.'
  tags:
  - Greenhouse
  - Greenhouse Onboarding API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GREENHOUSE_API_KEY: GREENHOUSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: onboarding
    baseUri: https://onboarding-api.greenhouse.io
    description: Greenhouse Onboarding API business capability. Self-contained, no shared references.
    resources:
    - name: graphql
      path: /graphql
      operations:
      - name: post
        method: POST
        description: Execute GraphQL query or mutation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.GREENHOUSE_USER}}'
      password: '{{env.GREENHOUSE_PASS}}'
  exposes:
  - type: rest
    namespace: onboarding-rest
    port: 8080
    description: REST adapter for Greenhouse Onboarding API. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/graphql
      name: graphql
      description: REST surface for graphql.
      operations:
      - method: POST
        name: post
        description: Execute GraphQL query or mutation
        call: onboarding.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: onboarding-mcp
    port: 9090
    transport: http
    description: MCP adapter for Greenhouse Onboarding API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: execute-graphql-query-mutation
      description: Execute GraphQL query or mutation
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: onboarding.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
