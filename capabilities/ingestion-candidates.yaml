naftiko: 1.0.0-alpha2
info:
  label: Greenhouse Candidate Ingestion API — Candidates
  description: 'Greenhouse Candidate Ingestion API — Candidates. 2 operations. Lead operation: Retrieve candidate. Self-contained
    Naftiko capability covering one Greenhouse business surface.'
  tags:
  - Greenhouse
  - Candidates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GREENHOUSE_API_KEY: GREENHOUSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ingestion-candidates
    baseUri: https://api.greenhouse.io/v1/partner
    description: Greenhouse Candidate Ingestion API — Candidates business capability. Self-contained, no shared references.
    resources:
    - name: candidates
      path: /candidates
      operations:
      - name: get
        method: GET
        description: Retrieve candidate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Submit candidate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GREENHOUSE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ingestion-candidates-rest
    port: 8080
    description: REST adapter for Greenhouse Candidate Ingestion API — Candidates. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/candidates
      name: candidates
      description: REST surface for candidates.
      operations:
      - method: GET
        name: get
        description: Retrieve candidate
        call: ingestion-candidates.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Submit candidate
        call: ingestion-candidates.post
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ingestion-candidates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Greenhouse Candidate Ingestion API — Candidates. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: retrieve-candidate
      description: Retrieve candidate
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ingestion-candidates.get
      outputParameters:
      - type: object
        mapping: $.
    - name: submit-candidate
      description: Submit candidate
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ingestion-candidates.post
      outputParameters:
      - type: object
        mapping: $.
