naftiko: 1.0.0-alpha2
info:
  label: Greenhouse Harvest API — Users
  description: 'Greenhouse Harvest API — Users. 3 operations. Lead operation: List users. Self-contained Naftiko capability
    covering one Greenhouse business surface.'
  tags:
  - Greenhouse
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GREENHOUSE_API_KEY: GREENHOUSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: harvest-users
    baseUri: https://harvest.greenhouse.io/v1
    description: Greenhouse Harvest API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: get
        method: GET
        description: List users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-id
      path: /users/{id}
      operations:
      - name: get
        method: GET
        description: Retrieve user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patch
        method: PATCH
        description: Update user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.GREENHOUSE_USER}}'
      password: '{{env.GREENHOUSE_PASS}}'
  exposes:
  - type: rest
    namespace: harvest-users-rest
    port: 8080
    description: REST adapter for Greenhouse Harvest API — Users. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: get
        description: List users
        call: harvest-users.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{id}
      name: users-id
      description: REST surface for users-id.
      operations:
      - method: GET
        name: get
        description: Retrieve user
        call: harvest-users.get
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patch
        description: Update user
        call: harvest-users.patch
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: harvest-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Greenhouse Harvest API — Users. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-users
      description: List users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: harvest-users.get
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-user
      description: Retrieve user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: harvest-users.get
      outputParameters:
      - type: object
        mapping: $.
    - name: update-user
      description: Update user
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: harvest-users.patch
      outputParameters:
      - type: object
        mapping: $.
