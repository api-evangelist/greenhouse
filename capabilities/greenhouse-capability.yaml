naftiko: 1.0.0-alpha2
info:
  label: Greenhouse Harvest API
  description: The Harvest API provides programmatic access to Greenhouse Recruiting data, including candidates, applications,
    jobs, departments, offices, and users. Authentication uses HTTP Basic Auth with an API token.
  tags:
  - Greenhouse
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: greenhouse
    baseUri: https://harvest.greenhouse.io/v1
    description: Greenhouse Harvest API HTTP API.
    authentication:
      type: basic
      username: '{{GREENHOUSE_USERNAME}}'
      password: '{{GREENHOUSE_PASSWORD}}'
    resources:
    - name: candidates
      path: /candidates
      operations:
      - name: get-candidates
        method: GET
        description: List candidates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post-candidates
        method: POST
        description: Create candidate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: candidates-id
      path: /candidates/{id}
      operations:
      - name: get-candidates-id
        method: GET
        description: Retrieve candidate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patch-candidates-id
        method: PATCH
        description: Update candidate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-candidates-id
        method: DELETE
        description: Delete candidate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: applications
      path: /applications
      operations:
      - name: get-applications
        method: GET
        description: List applications
        inputParameters:
        - name: job_id
          in: query
          type: integer
        - name: status
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: applications-id
      path: /applications/{id}
      operations:
      - name: get-applications-id
        method: GET
        description: Retrieve application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patch-applications-id
        method: PATCH
        description: Update application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: applications-id-advance
      path: /applications/{id}/advance
      operations:
      - name: post-applications-id-advance
        method: POST
        description: Advance application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: applications-id-hire
      path: /applications/{id}/hire
      operations:
      - name: post-applications-id-hire
        method: POST
        description: Hire application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: applications-id-reject
      path: /applications/{id}/reject
