      name: candidates
      description: REST surface for candidates.
      operations:
      - method: GET
        name: get
        description: List candidates
        call: harvest-candidates.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create candidate
        call: harvest-candidates.post
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/candidates/{id}
