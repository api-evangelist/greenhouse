        method: GET
        description: Retrieve candidate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patch
        method: PATCH
        description: Update candidate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete
