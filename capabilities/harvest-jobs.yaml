naftiko: 1.0.0-alpha2
info:
  label: Greenhouse Harvest API — Jobs
  description: 'Greenhouse Harvest API — Jobs. 3 operations. Lead operation: List jobs. Self-contained Naftiko capability
    covering one Greenhouse business surface.'
  tags:
  - Greenhouse
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GREENHOUSE_API_KEY: GREENHOUSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: harvest-jobs
    baseUri: https://harvest.greenhouse.io/v1
    description: Greenhouse Harvest API — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: jobs
      path: /jobs
      operations:
      - name: get
        method: GET
        description: List jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: jobs-id
      path: /jobs/{id}
      operations:
      - name: get
        method: GET
        description: Retrieve job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patch
        method: PATCH
        description: Update job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.GREENHOUSE_USER}}'
      password: '{{env.GREENHOUSE_PASS}}'
  exposes:
  - type: rest
    namespace: harvest-jobs-rest
    port: 8080
    description: REST adapter for Greenhouse Harvest API — Jobs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/jobs
      name: jobs
      description: REST surface for jobs.
      operations:
      - method: GET
        name: get
        description: List jobs
        call: harvest-jobs.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobs/{id}
      name: jobs-id
      description: REST surface for jobs-id.
      operations:
      - method: GET
        name: get
        description: Retrieve job
        call: harvest-jobs.get
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patch
        description: Update job
        call: harvest-jobs.patch
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: harvest-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Greenhouse Harvest API — Jobs. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-jobs
      description: List jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: harvest-jobs.get
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-job
      description: Retrieve job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: harvest-jobs.get
      outputParameters:
      - type: object
        mapping: $.
    - name: update-job
      description: Update job
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: harvest-jobs.patch
      outputParameters:
      - type: object
        mapping: $.
