naftiko: 1.0.0-alpha2
info:
  label: Greenhouse Job Board API — Jobs
  description: 'Greenhouse Job Board API — Jobs. 3 operations. Lead operation: List job posts. Self-contained Naftiko capability
    covering one Greenhouse business surface.'
  tags:
  - Greenhouse
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GREENHOUSE_API_KEY: GREENHOUSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: job-board-jobs
    baseUri: https://boards-api.greenhouse.io/v1/boards/{board_token}
    description: Greenhouse Job Board API — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: jobs
      path: /jobs
      operations:
      - name: get
        method: GET
        description: List job posts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: content
          in: query
          type: boolean
          description: Include full descriptions when true.
    - name: jobs-job_id
      path: /jobs/{job_id}
      operations:
      - name: get
        method: GET
        description: Retrieve job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Submit application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.GREENHOUSE_USER}}'
      password: '{{env.GREENHOUSE_PASS}}'
  exposes:
  - type: rest
    namespace: job-board-jobs-rest
    port: 8080
    description: REST adapter for Greenhouse Job Board API — Jobs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/jobs
      name: jobs
      description: REST surface for jobs.
      operations:
      - method: GET
        name: get
        description: List job posts
        call: job-board-jobs.get
        with:
          content: rest.content
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobs/{job-id}
      name: jobs-job-id
      description: REST surface for jobs-job_id.
      operations:
      - method: GET
        name: get
        description: Retrieve job
        call: job-board-jobs.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Submit application
        call: job-board-jobs.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: job-board-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Greenhouse Job Board API — Jobs. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-job-posts
      description: List job posts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: job-board-jobs.get
      with:
        content: tools.content
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-job
      description: Retrieve job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: job-board-jobs.get
      outputParameters:
      - type: object
        mapping: $.
    - name: submit-application
      description: Submit application
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: job-board-jobs.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
