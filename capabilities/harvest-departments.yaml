naftiko: 1.0.0-alpha2
info:
  label: Greenhouse Harvest API — Departments
  description: 'Greenhouse Harvest API — Departments. 1 operations. Lead operation: List departments. Self-contained Naftiko
    capability covering one Greenhouse business surface.'
  tags:
  - Greenhouse
  - Departments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GREENHOUSE_API_KEY: GREENHOUSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: harvest-departments
    baseUri: https://harvest.greenhouse.io/v1
    description: Greenhouse Harvest API — Departments business capability. Self-contained, no shared references.
    resources:
    - name: departments
      path: /departments
      operations:
      - name: get
        method: GET
        description: List departments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.GREENHOUSE_USER}}'
      password: '{{env.GREENHOUSE_PASS}}'
  exposes:
  - type: rest
    namespace: harvest-departments-rest
    port: 8080
    description: REST adapter for Greenhouse Harvest API — Departments. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/departments
      name: departments
      description: REST surface for departments.
      operations:
      - method: GET
        name: get
        description: List departments
        call: harvest-departments.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: harvest-departments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Greenhouse Harvest API — Departments. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-departments
      description: List departments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: harvest-departments.get
      outputParameters:
      - type: object
        mapping: $.
